name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect Flutter app directory
        id: appdir
        shell: bash
        run: |
          if [ -f "pubspec.yaml" ]; then
            echo "app_dir=." >> "$GITHUB_OUTPUT"
            echo "build_dir=build/web" >> "$GITHUB_OUTPUT"
          elif [ -f "univ_planner/pubspec.yaml" ]; then
            echo "app_dir=univ_planner" >> "$GITHUB_OUTPUT"
            echo "build_dir=univ_planner/build/web" >> "$GITHUB_OUTPUT"
          else
            echo "Could not find pubspec.yaml in root or univ_planner/" >&2
            exit 1
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        working-directory: ${{ steps.appdir.outputs.app_dir }}
        run: flutter pub get

      - name: Build Flutter web
        working-directory: ${{ steps.appdir.outputs.app_dir }}
        run: flutter build web --release --base-href /Univ_Planner/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.appdir.outputs.build_dir }}

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4