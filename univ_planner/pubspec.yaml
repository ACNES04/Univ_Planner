name: univ_planner
description: "대학생 학사 관리 앱 - 시간표, 학사일정, 결석, 학점, 과제 통합 관리"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 상태 관리
  flutter_riverpod: ^2.5.1

  # 로컬 저장소
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # 날짜 처리
  intl: ^0.19.0

  # 캘린더 UI
  table_calendar: ^3.1.1

  # 폰트
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # 코드 생성 (Hive Adapter)
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
